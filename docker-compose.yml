version: '3.8'

services:
  song:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      # PostgreSQL Configuration (Optional - for VIDI persistence)
      - PG_HOST=db
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_PASSWORD=secret
      - PG_DBNAME=song_db
    depends_on:
      - db
    networks:
      - song_net

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: song_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - song_net

networks:
  song_net:
    driver: bridge

volumes:
  pgdata: